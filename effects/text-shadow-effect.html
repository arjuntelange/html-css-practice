<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        h1{
            text-shadow:2px 2px 5px gold;
            border: 2px solid black;
            border-radius: 2px;
            text-align: center;
            display: inline-block;
            padding: 10px;
            margin-bottom: 10px;
        }

        h2{
            text-shadow: 0 0 10px aqua;
            border: 2px solid black;
            border-radius: 2px;
            text-align: center;
            display: inline-block;
            padding: 10px;
            margin-bottom: 10px;
        }
        h3{
            text-shadow: 1px 1px 4px red, -1px -1px 4px blue;
            border: 2px solid black;
            border-radius: 2px;
            text-align: center;
            display: inline-block;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Shadow Effet 1</h1><br>
    <h2>Shadow Effet 2</h2><br>
    <h3>Shadow Effet 3</h3> 
</body>
</html>
