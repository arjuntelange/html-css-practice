<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
        }

        .container {
            margin: 20px auto;
            width: 200px;
            height: 120px;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 18px;

            background-color: #f5f5f5;
            border-radius: 10px;
            transition: 0.3s all ease;
        }

        .box1 {
            box-shadow: 8px 12px 15px #525252;
        }

        .box1:hover {
            cursor: pointer;
            transform: translateY(-20px);
        }

        .box2 {
            box-shadow: 8px 12px 15px #525252;
        }

        .box2:hover {
            cursor: pointer;
            transform: translateX(20px);
        }
    </style>
</head>

<body>
    <div class="container box1">translateY</div>
    <div class="container box2">translateX</div>
</body>

</html>
