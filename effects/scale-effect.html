<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale Effect</title>
    <style>

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container {
            padding: 40px;
            width: 500px;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            background-color: blue;
        }

        .scale {
            margin: 20px auto;
            width: 150px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(128, 128, 128, 0.5);
            border-radius: 10px;
            background-color: red;
        }

        .scale-pst:hover {
            cursor: pointer;
            transition: 0.3s all ease;
            transform: scale(1.2);
        }

        .scale-ngt:hover {
            cursor: pointer;
            transition: 0.3s all ease;
            transform: scale(0.8);
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>transform: scale();</h1>

        <div class="scale scale-pst">Scale +</div>
        <div class="scale scale-ngt">Scale -</div>

    </div>

</body>
</html>
