<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .typing {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid white;

            width: 0;
            animation: typing 3s steps(30) forwards,
                blink 0.7s infinite;
        }

        @keyframes typing {
            to {
                width: 100%;
            }
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }
    </style>
</head>

<body>
    <h1 class="typing">I'm Arjun, a Frontend Developer</h1>
</body>

</html>
