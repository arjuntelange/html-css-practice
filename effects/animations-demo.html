<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations Demo</title>

    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            background-color: #f5f5f5;
        }

        /* 1. Fade In */

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .fade-box {
            width: 200px;
            height: 100px;
            background-color: lightcoral;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 3s ease;
        }

        /* 2. Slide Up */

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .slide-box {
            width: 200px;
            height: 100px;
            background-color: lightblue;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: slideUp 1s ease;
        }

        /* 3. Loader */

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #ccc;
            border-top: 5px solid #333;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

    </style>
</head>
<body>

    <div class="fade-box">Fade In</div>

    <div class="slide-box">Slide Up</div>

    <div class="loader"></div>

</body>
</html>
