<!DOCTYPE html>
<html>

<head>
  <style>
    img {
      width: 250px;
      margin: 20px;
    }

    .blur {
      filter: blur(4px);
    }

    .bright {
      filter: brightness(140%);
    }

    .contrast {
      filter: contrast(150%);
    }

    .grayscale {
      filter: grayscale(150%);
    }

    .hue-rotate {
      filter: hue-rotate(90deg);
    }

    .invert {
      filter: invert(100%);
    }

    .sepia {
      filter: sepia(80%);
    }
  </style>
</head>

<body>

  <img
    src="https://images.pexels.com/photos/45201/kitty-cat-kitten-pet-45201.jpeg?cs=srgb&dl=pexels-pixabay-45201.jpg&fm=jpg">
  <img
    src="https://images.pexels.com/photos/45201/kitty-cat-kitten-pet-45201.jpeg?cs=srgb&dl=pexels-pixabay-45201.jpg&fm=jpg"
    class="blur">
  <img
    src="https://images.pexels.com/photos/45201/kitty-cat-kitten-pet-45201.jpeg?cs=srgb&dl=pexels-pixabay-45201.jpg&fm=jpg"
    class="bright">
  <img
    src="https://images.pexels.com/photos/45201/kitty-cat-kitten-pet-45201.jpeg?cs=srgb&dl=pexels-pixabay-45201.jpg&fm=jpg"
    class="contrast">
  <img
    src="https://images.pexels.com/photos/45201/kitty-cat-kitten-pet-45201.jpeg?cs=srgb&dl=pexels-pixabay-45201.jpg&fm=jpg"
    class="grayscale">
  <img
    src="https://images.pexels.com/photos/45201/kitty-cat-kitten-pet-45201.jpeg?cs=srgb&dl=pexels-pixabay-45201.jpg&fm=jpg"
    class="hue-rotate">
  <img
    src="https://images.pexels.com/photos/45201/kitty-cat-kitten-pet-45201.jpeg?cs=srgb&dl=pexels-pixabay-45201.jpg&fm=jpg"
    class="invert">
  <img
    src="https://images.pexels.com/photos/45201/kitty-cat-kitten-pet-45201.jpeg?cs=srgb&dl=pexels-pixabay-45201.jpg&fm=jpg"
    class="sepia">

</body>

</html>
