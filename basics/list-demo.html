<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working with list</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
        }

        ul {
            list-style-type: disc;
        }

        ul > li:nth-child(2n) {
            background-color: #f5f5f5;
        }

        ol {
            list-style-type: upper-roman;
        }

        ol > li:nth-child(2n+1) {
            background-color: #f5f5f5;
        }

        dt {
            background-color: #f5f5f5;
            font-weight: bold; 
            font-size: 1.2rem;  
        }

        dl, dd {
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
    <h2>Unordered List</h2>
    <ul>
        <li>Wolf</li>
        <li>Tiger</li>
        <li>Lion</li>
        <li>Panther</li>
    </ul>

    <h2>Ordered List</h2>
    <ol>
        <li>BMW</li>
        <li>Audi</li>
        <li>Mercidiz</li>
        <li>Scoda</li>
    </ol>

    <h2>Description List</h2>
    <dl>
        <dt>Coffee</dt>
        <dd>Black hot drink</dd>
        <dt>Milk</dt>
        <dd>White cold drink</dd>
    </dl>
</body>

</html>
