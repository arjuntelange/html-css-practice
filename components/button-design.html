<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practicing Buttons</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 2px 3px 5px #27272A;
        }

        .primary {
            background-color: #007bff;
            color: white;
        }

        .primary:hover {
            background-color: #0056b3;
        }

        .secondary {
            background-color: #FF6237;
            color: white;
        }

        .secondary:hover {
            background-color: #EE2E3B;
        }

        .outline {
            background: transparent;
            border: 2px solid #C27AFF;
            color: #C27AFF;
        }

        .outline:hover {
            background-color: #C27AFF;
            color: white;
        }

        .disabled {
            background-color: #EC253F;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <button class="btn primary">Primary</button>
        <button class="btn secondary">Secondary</button>
        <button class="btn outline">Outline</button>
        <button class="btn disabled">Disabled</button>
    </div>
</body>

</html>
