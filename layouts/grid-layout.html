<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout Practice</title>
    <link rel="stylesheet" href="grid-layout.css">
    <style>
        body {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Gill Sans', 'Gill Sans MT', sans-serif;
            background-color: blanchedalmond;
        }

        .container {
            width: 600px;
            height: 400px;
            padding: 15px;
            display: grid;
            /* border: 1px solid black; */
            background-color: khaki;
            /* border-radius: 10px; */
            box-shadow: 5px 5px 20px black;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 1fr 2fr 1fr 1fr 1fr;
            gap: 0.5rem;
        }

        .box {
            /* border: 1px solid cyan; */
            box-shadow: 3px 3px 5px gray;
            border-radius: 8px;
            background-color: chocolate;
            font-family: Verdana, Tahoma, sans-serif;
            font-variant: small-caps;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box1 {
            background-color: cornflowerblue;
            grid-column: 1 / 3;
        }

        .box2 {
            background-color: coral;
        }

        .box3 {
            background-color: cadetblue;
        }

        .box4 {
            background-color: crimson;
            grid-column: 3 / 4;
            grid-row: 2 / 5;
        }

        .box5 {
            background-color: brown;
        }

        .box6 {
            background-color: darkcyan;
        }

        .box7 {
            background-color: darkkhaki;
        }

        .box8 {
            background-color: darksalmon;
            grid-row: 3 / 5;
            grid-column: 2 / 3;
        }

        .box9 {
            background-color: darkseagreen;
            grid-column: 2 / 4;
        }

        .box10 {
            background-color: skyblue;
            grid-column: 3 / 4;
        }
    </style>
</head>

<body>
    <h1>✨ Grid Layout ✨</h1>
    <div class="container">
        <div class="box box1">Krushan😎</div>
        <div class="box box10">Not Found☠️</div>
        <div class="box box2">Not Found☠️</div>
        <div class="box box3">Harshal😎</div>
        <div class="box box4">Vaishnavi🤗</div>
        <div class="box box5">Not Found☠️</div>
        <div class="box box6">Shreya😊</div>
        <div class="box box7">Sanskruti❤️😍</div>
        <div class="box box8">Rohit😇</div>
        <div class="box box9">Arjun💔🤕</div>
    </div>
    <h2>🧿♥️ My Friends Forever 💎♾️</h2>
</body>

</html>
