<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Practice</title>
    <style>
        body {
            padding: 0;
        }

        .container {
            padding: 20px;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            background-color: aquamarine;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 100px);
            gap: 20px;
        }

        .box {
            width: 100%;
            height: 100%;
            background-color: aqua;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.2);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box:nth-child(1) {
            grid-column: span 2;
        }

        .box:nth-child(6) {
            grid-column: span 3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
    </div>
</body>
</html>
