<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practicing Position in CSS</title>
    <style>

        body {
            padding: 50px;
            flex-direction: column;
            height: 2000px;
        }

        .box {
            width: 300px;
            height: 140px;
            text-align: center;
            line-height: 140px;
            font-size: 20px;
            font-family: system-ui, sans-serif;
            border: 1px solid black;
        }

        .position-static {
            background-color: aquamarine;
            position: static;
        }

        .position-relative {
            background-color: hotpink;
            position: relative;
            top: 20px;
            left: 40px;
        }

        .parent {
            width: 600px;
            height: 300px;
            margin: 20px;
            position: relative;
            border: 1px solid black;
            background-color: rgba(0, 0, 0, 0.146);
        }

        .position-absolute {
            background-color: cadetblue;
            position: absolute;
            bottom: 40px;
            right: 40px;
        }

        .position-fixed {
            background-color: coral;
            position: fixed;
            right: 100px;
            bottom: 200px;
        }

        .position-sticky {
            background-color: cornflowerblue;
            position: sticky;
            top: 0;
            left: 700px;
        }
        
    </style>
</head>

<body>
    <!-- position: static -->
    <div class="box position-static">Static</div>
    <hr>

    <!-- position: relative -->
    <div class="box position-relative">Relative</div>
    <hr>

    <!-- position: absolute -->
    <div class="parent">
        <div class="box position-absolute">
            Absolute
        </div>
    </div>
    <hr>

    <!-- position: fixed -->
    <div class="box position-fixed">Fixed</div>

    <!-- position: sticky -->
    <div class="box position-sticky">Sticky</div>

</body>

</html>
